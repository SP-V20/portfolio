<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Page Not Found | Siva Parvathy</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Epilogue:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#080b12; --surface:#0e1420; --border:rgba(255,255,255,0.07);
  --border2:rgba(255,255,255,0.12); --text:#e8edf5; --muted:#5a6580;
  --muted2:#8892a8; --green:#22d87a; --blue:#4f8ef7;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Epilogue',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; overflow:hidden; }

.bg-orb { position:fixed; border-radius:50%; filter:blur(80px); pointer-events:none; }
.bg-orb-1 { width:500px; height:500px; background:rgba(34,216,122,0.05); top:-100px; right:-100px; }
.bg-orb-2 { width:400px; height:400px; background:rgba(79,142,247,0.04); bottom:-80px; left:-80px; }

.container {
  position:relative; z-index:1;
  text-align:center; padding:40px 24px; max-width:500px;
  animation:fadeUp 0.6s ease both;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(24px);} to{opacity:1;transform:translateY(0);} }

.error-code {
  font-family:'Syne',sans-serif; font-weight:800;
  font-size:clamp(80px,20vw,140px); line-height:1;
  background:linear-gradient(135deg,var(--green),var(--blue));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  letter-spacing:-4px; margin-bottom:8px;
}
.error-label {
  font-family:'JetBrains Mono',monospace; font-size:12px;
  color:var(--muted); letter-spacing:3px; text-transform:uppercase;
  margin-bottom:24px;
}
.error-msg {
  font-size:16px; line-height:1.7; color:var(--muted2); margin-bottom:8px;
}
.error-sub {
  font-family:'JetBrains Mono',monospace; font-size:12px;
  color:var(--muted); background:var(--surface);
  border:1px solid var(--border2); border-radius:8px;
  padding:10px 16px; display:inline-block; margin-bottom:36px;
}
.error-sub span { color:var(--green); }

.btn-home {
  display:inline-flex; align-items:center; gap:8px;
  padding:12px 28px; border-radius:8px; font-size:14px; font-weight:600;
  text-decoration:none; background:var(--green); color:#080b12;
  transition:all 0.2s; font-family:'Epilogue',sans-serif;
}
.btn-home:hover { opacity:0.85; transform:translateY(-2px); box-shadow:0 8px 24px rgba(34,216,122,0.3); }

.grid-bg {
  position:fixed; inset:0; z-index:0;
  background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);
  background-size:60px 60px;
  mask-image:radial-gradient(ellipse 60% 60% at 50% 50%,black 0%,transparent 100%);
  -webkit-mask-image:radial-gradient(ellipse 60% 60% at 50% 50%,black 0%,transparent 100%);
}
</style>
</head>
<body>
<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>
<div class="grid-bg"></div>

<div class="container">
  <div class="error-code">404</div>
  <div class="error-label">Page Not Found</div>
  <p class="error-msg">Looks like this page doesn't exist.<br>Maybe it was moved or the URL is incorrect.</p>
  <div class="error-sub">
    <span>$</span> cd /home &amp;&amp; ./portfolio.sh
  </div>
  <br>
  <a class="btn-home" href="/">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Back to Portfolio
  </a>
</div>
</body>
</html>
